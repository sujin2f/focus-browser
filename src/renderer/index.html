<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Control Centre</title>
        <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
        <meta
            http-equiv="Content-Security-Policy"
            content="script-src 'self' 'unsafe-inline' 'unsafe-eval'"
        />
    </head>
    <body
        class="dark:bg-gray-950 dark:text-white min-h-dvh pt-10 pb-10 pr-2 pl-2"
    >
        <section id="root" class="container mx-auto"></section>
    </body>
</html>

<!--
// Card
-->
<template id="template--card">
    <a
        class="p-3 m-3 border border-gray-300 rounded-sm bg-white cursor-pointer dark:bg-gray-900 dark:border-transparent"
        role="button"
    >
        <h2
            class="pb-1 mb-1 text-lg font-bold text-gray-600 border-b-2 border-gray-300 dark:border-gray-800 dark:text-gray-200"
        ></h2>
        <p class="text-gray-500 dark:text-gray-400"></p>
    </a>
</template>

<!--
// Table
-->
<template id="template--table">
    <div
        class="relative flex flex-col w-full h-full overflow-x-auto overflow-y-hidden bg-clip-border"
    >
        <table class="w-full text-left table-auto min-w-max">
            <thead>
                <tr></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</template>

<template id="template--table__tr">
    <tr></tr>
</template>

<template id="template--table__th">
    <th class="p-4 border-b border-blue-gray-100">
        <p
            class="block font-sans text-sm antialiased font-normal leading-none text-blue-gray-900 opacity-70"
        ></p>
    </th>
</template>

<template id="template--table__td">
    <td class="p-4 border-b border-blue-gray-50"></td>
</template>

<!--
// Forms
-->
<template id="template--form">
    <form class="max-w-2xl m-auto p-3"></form>
</template>

<template id="template--label">
    <label>
        <span
            class="inline-block text-md font-light text-gray-700 mb-0.5 pl-3 dark:text-gray-300"
        ></span>
    </label>
</template>

<template id="template--input">
    <input
        class="w-full text-lg p-3 rounded-sm border border-gray-300 dark:text-white dark:bg-gray-800 dark:border-transparent mb-4"
        type="text"
    />
</template>

<template id="template--button">
    <button
        class="mb-4 px-4 py-2 border border-transparent rounded-md text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 cursor-pointer"
    ></button>
</template>

<!--
// Modal
-->
<template id="template--overlay">
    <div class="fixed inset-0 bg-black/50 w-full h-full"></div>
</template>
