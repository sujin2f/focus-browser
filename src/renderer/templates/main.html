<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Control Centre</title>
        <meta
            http-equiv="Content-Security-Policy"
            content="script-src 'self'"
        />
    </head>

    <body class="dark:bg-gray-950 dark:text-white min-h-dvh py-10">
        <div class="container mx-auto">
            <%=require('html-loader!./template-parts/h1.html').default %>
            <%=require('html-loader!./template-parts/back-button.html').default
            %>
            <section id="section-title" class="mb-4"></section>

            <%=require('html-loader!./template-parts/input.html').default %>
            <form id="section-form"></form>

            <%=require('html-loader!./template-parts/card.html').default %>
            <section
                class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 mt-2"
                id="section-grid"
            ></section>
        </div>
    </body>
</html>
