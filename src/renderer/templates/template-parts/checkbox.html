<template id="checkbox">
    <label class="mb-4 block">
        <p
            class="inline-block text-md font-light text-gray-700 mb-0.5 pl-3 dark:text-gray-300"
            data-selector="label"
        ></p>
        <input
            type="checkbox"
            class="ml-4 border-gray-300 dark:border-transparent"
            data-selector="input"
        />
        <p
            class="mt-1 pl-3 font-light text-gray-800 dark:text-gray-500 italic"
            data-selector="help-text"
        ></p>
        <p
            class="mt-1 pl-3 text-pink-900 dark:text-pink-600 hidden"
            data-selector="error-message"
        ></p>
    </label>
</template>
