<template id="select">
    <label class="mb-4 block">
        <p
            class="inline-block text-md font-light text-gray-700 mb-0.5 pl-3 dark:text-gray-300"
            data-selector="label"
        ></p>
        <select
            class="w-full text-lg p-3 rounded-sm border border-gray-300 dark:text-white dark:bg-gray-800 dark:border-transparent focus:outline-none focus:ring-2 focus:ring-pink-500"
            data-selector="input"
        ></select>
        <p
            class="mt-1 pl-3 font-light text-gray-800 dark:text-gray-500 italic"
            data-selector="help-text"
        ></p>
        <p
            class="mt-1 pl-3 text-pink-900 dark:text-pink-600 hidden"
            data-selector="error-message"
        ></p>
    </label>
</template>

<template id="option">
    <option></option>
</template>
